<!DOCTYPE html>

<head>
  <title>felxbox</title>
  <style>
    .main {
      display: flex;
      flex-direction: row;
      height: 50px;
      justify-content: space-between;
      align-items: center;
      background-color: purple;
      border-color: white;
      border-width: 5px;
      border-style: solid;
    }

    .search-box {
      width: 600px;
      border-radius: 17px;
      border-color: white;
      height: 27px;
      border-width: 1px;
    }

    .div3 {
      margin-right: 25px;
    }

    .down {
      background-color: purple;
      color: white;
      border-color: white;
      font-family: Arial, Helvetica, sans-serif;
      height: 30px;
      width: 100px;
      border-width: 1px;
    }
  </style>

<body>
  <div class="main">
    <div class="div1" style="color: white;
     margin-left: 20px;
     font-weight: 300;
     font-size: 18px;
     font-family: Arial, Helvetica, sans-serif;">
      Home
    </div>
    <div class="div2">
      <input class="search-box" type="text" placeholder="Search">
    </div>
    <div class="div3">
      <button class="down">
        Download
      </button>
    </div>
  </div>
  <p>

  </p>




</body>

</html>
